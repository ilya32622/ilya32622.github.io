<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь дежурств</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #eef4f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 2rem;
            color: #0b2b3d;
            border-bottom: 3px solid #c5dae9;
            padding-bottom: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #3d6b89;
            background: #dce8f1;
            padding: 4px 18px;
            border-radius: 40px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 18px;
            background: #f0f7fc;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .status-bar .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.online {
            background: #22c55e;
        }
        .dot.offline {
            background: #ef4444;
        }
        .status-bar .synced {
            color: #1f6e93;
            font-weight: 500;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin-bottom: 24px;
            padding: 12px 18px;
            background: #f8faff;
            border-radius: 60px;
            border: 1px solid #e2edf6;
            align-items: center;
        }
        .filters label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: #1f4560;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .filters input[type="radio"] {
            width: 17px;
            height: 17px;
            accent-color: #1f6e93;
            cursor: pointer;
        }
        .filter-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group .label {
            font-size: 0.8rem;
            color: #4b6f88;
            margin-right: 4px;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .month-card {
            background: #f9fcff;
            border-radius: 24px;
            padding: 18px 16px;
            border: 1px solid #e8f0f8;
        }
        .month-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0b2b3d;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2edf6;
            display: flex;
            justify-content: space-between;
        }
        .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #f0f5fa;
            font-size: 0.9rem;
            gap: 8px;
            flex-wrap: wrap;
        }
        .day-row:last-child {
            border-bottom: none;
        }
        .day-label {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
        }
        .day-label .name {
            font-weight: 600;
            color: #0b2b3d;
        }
        .day-label .date-badge {
            font-size: 0.7rem;
            background: #eef4f9;
            padding: 0 8px;
            border-radius: 30px;
            color: #4b6f88;
        }
        .today-badge {
            background: #d1e4f0;
            border-radius: 30px;
            padding: 0 10px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #1a4b65;
            text-transform: uppercase;
        }
        .check-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #2d5a77;
            cursor: pointer;
        }
        .check-item input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #1f6e93;
            cursor: pointer;
        }
        .footer {
            margin-top: 28px;
            text-align: center;
            color: #3d6886;
            font-size: 0.85rem;
            opacity: 0.7;
            border-top: 1px solid #cde0ec;
            padding-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #3d6886;
        }
        .no-days {
            text-align: center;
            padding: 30px;
            color: #4b6f88;
            font-size: 1.1rem;
        }
        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .month-grid {
                grid-template-columns: 1fr;
            }
            .day-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .check-group {
                margin-top: 4px;
            }
            .filters {
                border-radius: 28px;
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        📅 Общий календарь
        <small>синхронизация</small>
    </h1>

    <div class="status-bar">
        <span class="dot offline" id="statusDot"></span>
        <span id="statusText">Подключение к Supabase...</span>
        <span class="synced">⎇ общие данные</span>
    </div>

    <div class="filters" id="filters">
        <span class="label">📆 Показать:</span>
        <div class="filter-group">
            <label>
                <input type="radio" name="viewMode" value="3days" checked>
                3 дня
            </label>
            <label>
                <input type="radio" name="viewMode" value="week">
                Текущая неделя
            </label>
            <label>
                <input type="radio" name="viewMode" value="all">
                Все дни (1 год)
            </label>
        </div>
    </div>

    <div id="calendarContainer">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <div class="footer">✅ Отмечайте — изменения видны всем</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<script>
    // ============================================================
    // ↓↓↓ ВСТАВЬТЕ СВОИ ДАННЫЕ ИЗ SUPABASE (Settings → API) ↓↓↓
    // ============================================================
    const SUPABASE_URL = 'https://nelkcbzsjxinhydqxijx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lbGtjYnpzanhpbmh5ZHF4aWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzY0NjIsImV4cCI6MjA5NzIxMjQ2Mn0.-_rVVjxlnChD0iQikxTXK0Rixr-I3VvQt7V3WQ5quD0';
    // ============================================================

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const NAMES = ['Ваня', 'Федя', 'Илья'];
    const TIMES = ['12:00', '15:00', '18:00'];
    const TIME_KEYS = ['t12', 't15', 't18'];

    let state = {};
    let currentViewMode = '3days';

    function getDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
    }

    function formatDate(date) {
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', weekday: 'short' }).replace(/\./g, '');
    }

    function getKey(dateStr, timeKey) {
        return dateStr + '_' + timeKey;
    }

    function getNameForDate(date, startDate) {
        var diffDays = Math.floor((date - startDate) / (1000 * 60 * 60 * 24));
        var index = diffDays % 3;
        if (index < 0) index += 3;
        return NAMES[index];
    }

    function updateStatus(online, message) {
        var dot = document.getElementById('statusDot');
        var text = document.getElementById('statusText');
        dot.className = 'dot ' + (online ? 'online' : 'offline');
        text.textContent = message || (online ? 'Синхронизация работает' : 'Нет подключения');
    }

    async function loadFromSupabase() {
        try {
            var result = await sb.from('schedule').select('date_key, time_key, checked');
            var data = result.data;
            var error = result.error;

            if (error) throw error;

            state = {};
            for (var i = 0; i < data.length; i++) {
                var row = data[i];
                state[getKey(row.date_key, row.time_key)] = row.checked;
            }

            updateStatus(true, 'Загружено ' + data.length + ' отметок');
            render();
        } catch (err) {
            console.error('Ошибка загрузки:', err);
            updateStatus(false, 'Ошибка загрузки');
            render();
        }
    }

    async function saveToSupabase(dateKey, timeKey, checked) {
        try {
            var result = await sb.from('schedule').upsert({
                date_key: dateKey,
                time_key: timeKey,
                checked: checked
            }, { onConflict: 'date_key, time_key' });
            var error = result.error;

            if (error) throw error;
            updateStatus(true, '✅ Сохранено');
        } catch (err) {
            console.error('Ошибка сохранения:', err);
            updateStatus(false, '❌ Ошибка сохранения');
            var key = getKey(dateKey, timeKey);
            state[key] = !checked;
            render();
        }
    }

    function getFilteredDates() {
        var startDate = new Date();
        startDate.setHours(0, 0, 0, 0);

        var endDate = new Date(startDate);

        switch (currentViewMode) {
            case '3days':
                endDate.setDate(startDate.getDate() + 2);
                break;
            case 'week': {
                var dayOfWeek = startDate.getDay();
                var daysUntilMonday = (dayOfWeek === 0) ? 1 : 1 - dayOfWeek;
                var monday = new Date(startDate);
                monday.setDate(startDate.getDate() + daysUntilMonday);
                var sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                endDate = sunday;
                break;
            }
            case 'all':
            default:
                endDate.setFullYear(startDate.getFullYear() + 1);
                break;
        }

        var days = [];
        var current = new Date(startDate);
        while (current <= endDate) {
            days.push(new Date(current));
            current.setDate(current.getDate() + 1);
        }
        return days;
    }

    function render() {
        var container = document.getElementById('calendarContainer');
        var days = getFilteredDates();

        if (days.length === 0) {
            container.innerHTML = '<div class="no-days">📭 Нет дней для отображения</div>';
            return;
        }

        var monthsMap = {};
        for (var i = 0; i < days.length; i++) {
            var date = days[i];
            var monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
            if (!monthsMap[monthKey]) monthsMap[monthKey] = [];
            monthsMap[monthKey].push(date);
        }

        var sortedMonths = Object.keys(monthsMap).sort();
        var todayStr = getDateStr(new Date());
        var startDate = new Date();
        startDate.setHours(0, 0, 0, 0);

        var html = '';
        for (var m = 0; m < sortedMonths.length; m++) {
            var monthKey = sortedMonths[m];
            var dates = monthsMap[monthKey];
            var parts = monthKey.split('-');
            var year = parts[0];
            var month = parts[1];
            var monthName = new Date(year, month - 1, 1).toLocaleString('ru-RU', { month: 'long' });

            html += '<div class="month-card">';
            html += '<div class="month-title">' + monthName + ' ' + year + ' <span>' + dates.length + ' дн.</span></div>';

            for (var d = 0; d < dates.length; d++) {
                var date = dates[d];
                var dateStr = getDateStr(date);
                var name = getNameForDate(date, startDate);
                var isToday = (dateStr === todayStr);
                var formatted = formatDate(date);

                html += '<div class="day-row">';
                html += '<div class="day-label">';
                html += '<span class="name">' + name + '</span>';
                html += '<span class="date-badge">' + formatted + '</span>';
                if (isToday) html += '<span class="today-badge">сегодня</span>';
                html += '</div>';

                html += '<div class="check-group">';
                for (var t = 0; t < TIMES.length; t++) {
                    var key = getKey(dateStr, TIME_KEYS[t]);
                    var checked = state[key] === true ? 'checked' : '';
                    html += '<label class="check-item">';
                    html += '<input type="checkbox" data-date="' + dateStr + '" data-time="' + TIME_KEYS[t] + '" ' + checked + '>';
                    html += TIMES[t];
                    html += '</label>';
                }
                html += '</div>';
                html += '</div>';
            }

            html += '</div>';
        }

        container.innerHTML = html;

        var checkboxes = document.querySelectorAll('#calendarContainer input[type="checkbox"]');
        for (var c = 0; c < checkboxes.length; c++) {
            var cb = checkboxes[c];
            cb.addEventListener('change', function() {
                var dateKey = this.dataset.date;
                var timeKey = this.dataset.time;
                var checked = this.checked;
                state[getKey(dateKey, timeKey)] = checked;
                saveToSupabase(dateKey, timeKey, checked);
            });
        }
    }

    var radios = document.querySelectorAll('input[name="viewMode"]');
    for (var r = 0; r < radios.length; r++) {
        radios[r].addEventListener('change', function() {
            if (this.checked) {
                currentViewMode = this.value;
                render();
            }
        });
    }

    loadFromSupabase();

    setInterval(function() {
        updateStatus(true, 'Синхронизация активна');
    }, 30000);
</script>
</body>
</html>
