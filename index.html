<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь дежурств</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #eef4f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 2rem;
            color: #0b2b3d;
            border-bottom: 3px solid #c5dae9;
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #3d6b89;
            background: #dce8f1;
            padding: 4px 18px;
            border-radius: 40px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 18px;
            background: #f0f7fc;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .status-bar .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.online { background: #22c55e; }
        .dot.offline { background: #ef4444; }
        .status-bar .synced { color: #1f6e93; font-weight: 500; }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .month-card {
            background: #f9fcff;
            border-radius: 24px;
            padding: 18px 16px;
            border: 1px solid #e8f0f8;
        }
        .month-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0b2b3d;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2edf6;
            display: flex;
            justify-content: space-between;
        }
        .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #f0f5fa;
            font-size: 0.9rem;
            gap: 8px;
            flex-wrap: wrap;
        }
        .day-row:last-child { border-bottom: none; }
        .day-label {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
        }
        .day-label .name { font-weight: 600; color: #0b2b3d; }
        .day-label .date-badge {
            font-size: 0.7rem;
            background: #eef4f9;
            padding: 0 8px;
            border-radius: 30px;
            color: #4b6f88;
        }
        .today-badge {
            background: #d1e4f0;
            border-radius: 30px;
            padding: 0 10px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #1a4b65;
            text-transform: uppercase;
        }
        .check-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #2d5a77;
            cursor: pointer;
        }
        .check-item input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #1f6e93;
            cursor: pointer;
        }
        .footer {
            margin-top: 28px;
            text-align: center;
            color: #3d6886;
            font-size: 0.85rem;
            opacity: 0.7;
            border-top: 1px solid #cde0ec;
            padding-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #3d6886;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .month-grid { grid-template-columns: 1fr; }
            .day-row { flex-direction: column; align-items: flex-start; }
            .check-group { margin-top: 4px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        📅 Общий календарь
        <small>синхронизация</small>
    </h1>

    <div class="status-bar">
        <span class="dot offline" id="statusDot"></span>
        <span id="statusText">Подключение к Supabase...</span>
        <span class="synced">⎇ общие данные</span>
    </div>

    <div id="calendarContainer">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <div class="footer">✅ Отмечайте — изменения видны всем</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ==================== НАСТРОЙКИ ====================
    const SUPABASE_URL = 'https://nelkcbzsjxinhydqxijx.supabase.co/rest/v1/';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lbGtjYnpzanhpbmh5ZHF4aWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzY0NjIsImV4cCI6MjA5NzIxMjQ2Mn0.-_rVVjxlnChD0iQikxTXK0Rixr-I3VvQt7V3WQ5quD0';
    // ==================================================

    // СОЗДАЁМ КЛИЕНТ (ОДИН РАЗ!)
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const NAMES = ['Илья', 'Ваня', 'Федя'];
    const TIMES = ['12:00', '15:00', '18:00'];
    const TIME_KEYS = ['t12', 't15', 't18'];

    let state = {};

    function getDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function formatDate(date) {
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', weekday: 'short' }).replace(/\./g, '');
    }

    function getKey(dateStr, timeKey) {
        return `${dateStr}_${timeKey}`;
    }

    function getNameForDate(date, startDate) {
        const diffDays = Math.floor((date - startDate) / (1000 * 60 * 60 * 24));
        return NAMES[diffDays % 3];
    }

    function updateStatus(online, message) {
        document.getElementById('statusDot').className = `dot ${online ? 'online' : 'offline'}`;
        document.getElementById('statusText').textContent = message || (online ? 'Синхронизация работает' : 'Нет подключения');
    }

    async function loadFromSupabase() {
        try {
            const { data, error } = await sb
                .from('schedule')
                .select('date_key, time_key, checked');

            if (error) throw error;

            state = {};
            data.forEach(row => {
                state[getKey(row.date_key, row.time_key)] = row.checked;
            });

            updateStatus(true, `Загружено ${data.length} отметок`);
            render();
        } catch (err) {
            console.error('Ошибка загрузки:', err);
            updateStatus(false, 'Ошибка загрузки');
            render();
        }
    }

    async function saveToSupabase(dateKey, timeKey, checked) {
        try {
            const { error } = await sb
                .from('schedule')
                .upsert({ date_key: dateKey, time_key: timeKey, checked: checked }, { onConflict: 'date_key, time_key' });

            if (error) throw error;
            updateStatus(true, '✅ Сохранено');
        } catch (err) {
            console.error('Ошибка сохранения:', err);
            updateStatus(false, '❌ Ошибка сохранения');
            const key = getKey(dateKey, timeKey);
            state[key] = !checked;
            render();
        }
    }

    function render() {
        const container = document.getElementById('calendarContainer');
        const startDate = new Date();
        startDate.setHours(0, 0, 0, 0);

        const endDate = new Date(startDate);
        endDate.setFullYear(startDate.getFullYear() + 1);

        const allDays = [];
        let current = new Date(startDate);
        while (current <= endDate) {
            allDays.push(new Date(current));
            current.setDate(current.getDate() + 1);
        }

        const monthsMap = new Map();
        allDays.forEach(date => {
            const monthKey = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
            if (!monthsMap.has(monthKey)) monthsMap.set(monthKey, []);
            monthsMap.get(monthKey).push(date);
        });

        const sortedMonths = Array.from(monthsMap.keys()).sort();
        const todayStr = getDateStr(new Date());

        let html = '';
        sortedMonths.forEach(monthKey => {
            const dates = monthsMap.get(monthKey);
            const [year, month] = monthKey.split('-');
            const monthName = new Date(year, month-1, 1).toLocaleString('ru-RU', { month: 'long' });

            html += `<div class="month-card">`;
            html += `<div class="month-title">${monthName} ${year} <span>${dates.length} дн.</span></div>`;

            dates.forEach(date => {
                const dateStr = getDateStr(date);
                const name = getNameForDate(date, startDate);
                const isToday = (dateStr === todayStr);
                const formatted = formatDate(date);

                html += `<div class="day-row">`;
                html += `<div class="day-label">`;
                html += `<span class="name">${name}</span>`;
                html += `<span class="date-badge">${formatted}</span>`;
                if (isToday) html += `<span class="today-badge">сегодня</span>`;
                html += `</div>`;

                html += `<div class="check-group">`;
                TIMES.forEach((time, idx) => {
                    const key = getKey(dateStr, TIME_KEYS[idx]);
                    const checked = state[key] === true ? 'checked' : '';
                    html += `<label class="check-item">`;
                    html += `<input type="checkbox" data-date="${dateStr}" data-time="${TIME_KEYS[idx]}" ${checked}>`;
                    html += `${time}`;
                    html += `</label>`;
                });
                html += `</div>`;
                html += `</div>`;
            });

            html += `</div>`;
        });

        container.innerHTML = html;

        document.querySelectorAll('#calendarContainer input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', function() {
                const dateKey = this.dataset.date;
                const timeKey = this.dataset.time;
                const checked = this.checked;
                state[getKey(dateKey, timeKey)] = checked;
                saveToSupabase(dateKey, timeKey, checked);
            });
        });
    }

    loadFromSupabase();

    setInterval(() => {
        updateStatus(true, 'Синхронизация активна');
    }, 30000);
</script>
</body>
</html> в
